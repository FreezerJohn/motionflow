<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionFlow Config</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        
        body {
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .navbar {
            padding: 0.5rem 1rem;
            flex-shrink: 0;
        }
        
        #main-container {
            display: flex;
            flex-direction: row;
            height: calc(100vh - 56px);
            overflow: hidden;
        }
        
        /* Left sidebar - settings */
        #settings-panel {
            width: 380px;
            min-width: 320px;
            background: #111;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Tabs for sections */
        .settings-tabs {
            display: flex;
            border-bottom: 1px solid #333;
            background: #1a1a1a;
            flex-shrink: 0;
        }
        
        .settings-tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            color: #888;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .settings-tab:hover {
            color: #fff;
            background: #222;
        }
        
        .settings-tab.active {
            color: #fff;
            border-bottom-color: #0d6efd;
            background: #222;
        }
        
        .settings-tab i {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        /* Tab content panels */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        /* Form styling */
        .form-label {
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        
        .form-control, .form-select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .form-control:focus, .form-select:focus {
            background: #333;
            border-color: #0d6efd;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        
        .form-control::placeholder {
            color: #666;
        }
        
        .form-check-input {
            background-color: #2a2a2a;
            border-color: #555;
        }
        
        .form-check-input:checked {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        
        .form-check-label {
            color: #ccc;
            font-size: 0.9rem;
        }
        
        /* Section headers */
        .section-header {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 20px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        
        .section-header:first-child {
            margin-top: 0;
        }
        
        /* Stream cards */
        .stream-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stream-card {
            background: #222;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .stream-card:hover {
            background: #2a2a2a;
            border-color: #444;
        }
        
        .stream-card.active {
            border-color: #0d6efd;
            background: #1a2a3a;
        }
        
        .stream-card.disabled-stream {
            opacity: 0.5;
        }
        
        .stream-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stream-card-name {
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .stream-card-url {
            color: #666;
            font-size: 0.75rem;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .stream-card-stats {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            font-size: 0.75rem;
            color: #888;
        }
        
        /* Toggle switch for streams */
        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: 0.2s;
            border-radius: 20px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: #888;
            transition: 0.2s;
            border-radius: 50%;
        }
        
        .toggle-switch input:checked + .toggle-slider {
            background-color: #0d6efd;
        }
        
        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(16px);
            background-color: #fff;
        }
        
        /* Stream toggle with label */
        .stream-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .toggle-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
        }
        
        .stream-card:not(.disabled-stream) .toggle-label {
            color: #4caf50;
        }
        
        /* Add stream button */
        .add-stream-btn {
            background: transparent;
            border: 1px dashed #444;
            border-radius: 6px;
            padding: 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        
        .add-stream-btn:hover {
            border-color: #0d6efd;
            color: #0d6efd;
        }
        
        /* Right panel - video and editor */
        #editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #000;
        }
        
        /* Video section */
        #video-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 0;
            overflow: hidden;
            background: #000;
        }
        
        #video-container {
            position: relative;
            display: inline-block;
        }
        
        #video-stream {
            display: block;
            /* Size set by JavaScript to fill container while preserving aspect ratio */
        }
        
        /* Canvas sits exactly on top of video, sized by JS */
        #video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: auto;
            cursor: crosshair;
            /* Width/height set by JS to match video exactly */
        }
        
        /* Video status overlay (loading / error) */
        #video-status-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #video-status-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #video-loading, #video-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: #888;
            font-size: 0.95rem;
        }
        #video-loading i, #video-error i {
            font-size: 2.5rem;
        }
        #video-error i {
            color: #c44;
        }
        
        .no-stream-msg {
            text-align: center;
            color: #444;
        }
        
        .no-stream-msg i {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        /* Stream editor panel (below video) */
        #stream-editor {
            background: #111;
            border-top: 1px solid #333;
            padding: 15px 20px;
            max-height: 35vh;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .editor-title {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .editor-actions {
            display: flex;
            gap: 8px;
        }
        
        /* Zone/Door list in editor */
        .zone-door-section {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .zone-list-container, .door-list-container {
            flex: 1;
        }
        
        .zone-door-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .zone-door-title {
            font-size: 0.85rem;
            color: #888;
        }
        
        .zone-item, .door-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: #222;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        
        .zone-item:hover, .door-item:hover {
            background: #2a2a2a;
        }
        
        .zone-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            display: inline-block;
        }
        
        .item-actions {
            opacity: 0;
            transition: opacity 0.15s;
        }
        
        .zone-item:hover .item-actions,
        .door-item:hover .item-actions {
            opacity: 1;
        }
        
        .item-actions button {
            background: none;
            border: none;
            color: #666;
            padding: 2px 6px;
            cursor: pointer;
        }
        
        .item-actions button:hover {
            color: #fff;
        }
        
        .item-actions .delete-btn:hover {
            color: #dc3545;
        }
        
        .empty-list {
            color: #555;
            font-size: 0.8rem;
            font-style: italic;
            padding: 8px;
        }
        
        /* Drawing mode indicator */
        .draw-mode-banner {
            background: #2a1a00;
            border: 1px solid #ff9800;
            color: #ff9800;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Door angle controls */
        .door-angle-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .door-angle-control input[type="range"] {
            flex: 1;
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            #main-container {
                flex-direction: column;
            }
            
            #settings-panel {
                width: 100%;
                height: 50vh;
                border-right: none;
                border-bottom: 1px solid #333;
            }
            
            #editor-panel {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-cog"></i> Config
            </span>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-success btn-sm" id="apply-btn" style="display: none;">
                    <i class="fas fa-check"></i> Apply
                </button>
                <a href="/live" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-eye"></i> Live
                </a>
            </div>
        </div>
    </nav>

    <div id="main-container">
        <!-- Left: Settings Panel -->
        <div id="settings-panel">
            <div class="settings-tabs">
                <div class="settings-tab active" data-tab="streams">
                    <i class="fas fa-video"></i>
                    Streams
                </div>
                <div class="settings-tab" data-tab="general">
                    <i class="fas fa-sliders-h"></i>
                    General
                </div>
                <div class="settings-tab" data-tab="mqtt">
                    <i class="fas fa-network-wired"></i>
                    MQTT
                </div>
            </div>
            
            <div class="tab-content">
                <!-- Streams Tab -->
                <div id="tab-streams" class="tab-pane active">
                    <div class="stream-list" id="stream-list">
                        <!-- Stream cards inserted by JS -->
                    </div>
                    <div class="add-stream-btn" id="add-stream-btn">
                        <i class="fas fa-plus"></i> Add Stream
                    </div>
                </div>
                
                <!-- General Tab -->
                <div id="tab-general" class="tab-pane">
                    <div class="section-header">Performance</div>
                    
                    <div class="mb-3">
                        <label class="form-label">Max FPS per Stream</label>
                        <input type="number" class="form-control" id="cfg-max-fps" min="1" max="60" value="15">
                    </div>
                </div>
                
                <!-- MQTT Tab -->
                <div id="tab-mqtt" class="tab-pane">
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="cfg-mqtt-enabled">
                        <label class="form-check-label" for="cfg-mqtt-enabled">
                            Enable MQTT
                        </label>
                    </div>
                    
                    <div id="mqtt-settings">
                        <div class="mb-3">
                            <label class="form-label">Broker</label>
                            <input type="text" class="form-control" id="cfg-mqtt-broker" placeholder="localhost">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Port</label>
                            <input type="number" class="form-control" id="cfg-mqtt-port" value="1883">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Base Topic</label>
                            <input type="text" class="form-control" id="cfg-mqtt-topic" placeholder="motionflow">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Username (optional)</label>
                            <input type="text" class="form-control" id="cfg-mqtt-user" placeholder="">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password (optional)</label>
                            <input type="password" class="form-control" id="cfg-mqtt-pass" placeholder="">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">QoS</label>
                            <select class="form-select" id="cfg-mqtt-qos">
                                <option value="0">0 - At most once</option>
                                <option value="1">1 - At least once</option>
                                <option value="2">2 - Exactly once</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right: Video & Stream Editor -->
        <div id="editor-panel">
            <div id="video-section">
                <!-- No stream selected message -->
                <div id="no-stream-msg" class="no-stream-msg">
                    <i class="fas fa-video-slash"></i>
                    <h5>No Stream Selected</h5>
                    <p class="text-muted small">Select a stream from the list to configure zones and doors</p>
                </div>
                
                <!-- Video container (hidden until stream selected) -->
                <div id="video-container" style="display: none;">
                    <img id="video-stream" src="" alt="Stream Preview" crossorigin="anonymous">
                    <canvas id="video-overlay"></canvas>
                    <!-- Loading / error overlay -->
                    <div id="video-status-overlay">
                        <div id="video-loading" style="display: none;">
                            <i class="fas fa-circle-notch fa-spin"></i>
                            <span>Connecting…</span>
                        </div>
                        <div id="video-error" style="display: none;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Stream unavailable</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Stream Editor (shown when stream selected) -->
            <div id="stream-editor" style="display: none;">
                <div class="editor-header">
                    <div class="editor-title">
                        <i class="fas fa-edit"></i> 
                        <span id="editor-stream-name">Stream Settings</span>
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-outline-danger btn-sm" id="delete-stream-btn">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
                
                <!-- Draw mode banner (hidden by default) -->
                <div class="draw-mode-banner" id="draw-mode-banner" style="display: none;">
                    <div>
                        <i class="fas fa-pencil-alt"></i>
                        <span id="draw-mode-text">Drawing new zone...</span>
                        <span class="badge bg-warning text-dark ms-2" id="points-count">0/4</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <input type="text" class="form-control form-control-sm" id="new-item-name" 
                               placeholder="Name" style="width: 120px;">
                        <button class="btn btn-sm btn-outline-light" id="cancel-draw-btn">Cancel</button>
                        <button class="btn btn-sm btn-success" id="confirm-draw-btn" disabled>Add</button>
                    </div>
                </div>
                
                <!-- Door angle controls (shown when drawing door) -->
                <div class="door-angle-control" id="door-angle-control" style="display: none;">
                    <label class="form-label mb-0">Enter Direction:</label>
                    <input type="range" class="form-range" id="door-angle-slider" min="0" max="359" value="0">
                    <span id="door-angle-value" class="badge bg-secondary">0°</span>
                </div>
                
                <!-- Stream basic settings -->
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="stream-name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">RTSP URL</label>
                        <input type="text" class="form-control" id="stream-url" placeholder="rtsp://...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">&nbsp;</label>
                        <div class="form-check mt-2">
                            <input type="checkbox" class="form-check-input" id="stream-enabled">
                            <label class="form-check-label" for="stream-enabled">Enabled</label>
                        </div>
                    </div>
                </div>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">MQTT Topic Suffix</label>
                        <input type="text" class="form-control" id="stream-mqtt-suffix" placeholder="/living_room">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Confidence Threshold</label>
                        <input type="number" class="form-control" id="stream-confidence" 
                               min="0.1" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                
                <!-- Zones & Doors -->
                <div class="zone-door-section">
                    <div class="zone-list-container">
                        <div class="zone-door-header">
                            <span class="zone-door-title">
                                <i class="fas fa-vector-square text-primary"></i> Zones
                            </span>
                            <button class="btn btn-sm btn-outline-primary" id="add-zone-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="zone-items">
                            <div class="empty-list">No zones defined</div>
                        </div>
                    </div>
                    
                    <div class="door-list-container">
                        <div class="zone-door-header">
                            <span class="zone-door-title">
                                <i class="fas fa-door-open text-warning"></i> Doors
                            </span>
                            <button class="btn btn-sm btn-outline-warning" id="add-door-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="door-items">
                            <div class="empty-list">No doors defined</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/config.js"></script>
</body>
</html>
